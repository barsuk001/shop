<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barsuk Online Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #222222);
            margin: 0;
            padding: 10px;
        }
        .header {
            text-align: center;
            padding: 10px 0;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 1px solid var(--tg-theme-hint-color, #ccc);
            margin-bottom: 15px;
        }
        .category-section {
            margin-bottom: 20px;
        }
        .category-title {
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0;
            padding-left: 5px;
            color: var(--tg-theme-text-color, #222222);
            border-left: 4px solid #e67e22;
        }
        .catalog {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .product-card {
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .product-img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            background-color: #e0e0e0;
        }
        .product-name {
            font-size: 13px;
            font-weight: 600;
            margin: 8px 0 4px 0;
            height: 38px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .product-price {
            font-size: 15px;
            font-weight: bold;
            color: #e67e22;
            margin-bottom: 8px;
        }
        .btn-add {
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            padding: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .counter-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #ddd;
            border-radius: 8px;
            overflow: hidden;
        }
        .counter-btn {
            background-color: #ccc;
            border: none;
            padding: 8px 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        .counter-value {
            font-weight: bold;
            font-size: 14px;
        }
        .footer-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--tg-theme-bg-color, #ffffff);
            padding: 12px;
            box-shadow: 0 -3px 10px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .total-price {
            font-size: 16px;
            font-weight: bold;
        }
        .btn-order {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
        }
        .main-container {
            padding-bottom: 80px;
        }
    </style>
</head>
<body>

    <div class="header">🦅 Магазин «Барсук»</div>
    
    <div class="main-container" id="main-container"></div>

    <div class="footer-bar">
        <div class="total-price">Итого: <span id="total-sum">0</span> ₸</div>
        <button class="btn-order" id="btn-order" onclick="sendOrder()">Оформить</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Изображения по умолчанию для каждой категории товаров
        const defaultImages = {
            beer: "https://images.unsplash.com/photo-1566633806327-68e152aaf26d?w=400",
            vd: "https://images.unsplash.com/photo-1551538827-9c037cb4f32a?w=400",
            wh: "https://images.unsplash.com/photo-1527281400683-1aae777175f8?w=400",
            soda: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=400",
            energy: "https://images.unsplash.com/photo-1622543953495-a17ff62585c0?w=400",
            water: "https://images.unsplash.com/photo-1548839140-29a749e1cf4d?w=400",
            liqueur: "https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=400",
            cognac: "https://images.unsplash.com/photo-1510626176961-4b57d4f3f313?w=400",
            bb: "https://images.unsplash.com/photo-1608270586620-248524c67de9?w=400",
            sn: "https://images.unsplash.com/photo-1566478989037-eec170784d0b?w=400"
        };

        // Базовый каталог, который отобразится, если нет связи с ботом
        let catalogData = {
            "beer": {
                "title": "🍻 Разливное пиво (за 1 литр)",
                "items": [
                    {"name": "Разливное пиво Прага 1.0л", "price": 1100, "status": true},
                    {"name": "Разливное пиво Жигули 1.0л", "price": 990, "status": true},
                    {"name": "Разливное пиво Шымкентское 1.0л", "price": 990, "status": true},
                    {"name": "Разливное пиво Эрзманн 1.0л", "price": 1290, "status": true}
                ]
            }
        };
        
        // Автоматически подгружаем ВСЕ категории и актуальные цены из твоего бота (shop_catalog.json)
        try {
            if (tg.initDataUnsafe && tg.initDataUnsafe.start_param) {
                const decodedData = JSON.parse(decodeURIComponent(tg.initDataUnsafe.start_param));
                if (decodedData && Object.keys(decodedData).length > 0) {
                    catalogData = decodedData;
                }
            }
        } catch (e) {
            console.log("Ошибка загрузки каталога из параметров Telegram");
        }

        const cart = {};

        // Функция построения витрины по подпунктам
        function renderStore() {
            const container = document.getElementById('main-container');
            container.innerHTML = '';

            for (const catId in catalogData) {
                const category = catalogData[catId];
                
                // Отображаем только активные товары (status === true)
                const visibleItems = category.items.filter(item => item.status !== false);
                if (visibleItems.length === 0) continue;

                // Создаем блок для категории (подпункта)
                const section = document.createElement('div');
                section.className = 'category-section';
                
                let html = `<div class="category-title">${category.title}</div>`;
                html += `<div class="catalog">`;

                visibleItems.forEach((item, index) => {
                    const pId = `${catId}_${index}`;
                    const count = cart[pId] ? cart[pId].count : 0;
                    const imgUrl = defaultImages[catId] || "https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=400";

                    let actionHtml = `<button class="btn-add" onclick="addToCart('${pId}', '${item.name}', ${item.price})">В корзину</button>`;
                    
                    if (count > 0) {
                        actionHtml = `
                            <div class="counter-container">
                                <button class="counter-btn" onclick="changeCount('${pId}', -1)">-</button>
                                <span class="counter-value">${count} шт</span>
                                <button class="counter-btn" onclick="changeCount('${pId}', 1)">+</button>
                            </div>
                        `;
                    }

                    html += `
                        <div class="product-card">
                            <img class="product-img" src="${imgUrl}" alt="${item.name}">
                            <div class="product-name">${item.name}</div>
                            <div class="product-price">${item.price} ₸</div>
                            ${actionHtml}
                        </div>
                    `;
                });

                html += `</div>`;
                section.innerHTML = html;
                container.appendChild(section);
            }
            updateTotal();
        }

        function addToCart(pId, name, price) {
            cart[pId] = { name: name, price: price, count: 1 };
            renderStore();
        }

        function changeCount(pId, delta) {
            if (!cart[pId]) return;
            cart[pId].count += delta;
            if (cart[pId].count <= 0) {
                delete cart[pId];
            }
            renderStore();
        }

        function updateTotal() {
            let total = 0;
            for (const id in cart) {
                total += cart[id].price * cart[id].count;
            }
            document.getElementById('total-sum').innerText = total;
        }

        function sendOrder() {
            let orderItems = [];
            for (const id in cart) {
                orderItems.push(cart[id]);
            }
            
            if (orderItems.length === 0) {
                alert("Корзина пуста!");
                return;
            }

            tg.sendData(JSON.stringify(orderItems));
            tg.close();
        }

        // Запуск отображения
        renderStore();
    </script>
</body>
</html>
