<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин Барсук</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #131313;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Шапка */
        .header {
            text-align: center;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 1px solid #2d2d2d;
            background-color: #1a1a1a;
        }

        /* Горизонтальное меню категорий */
        .categories-menu {
            display: flex;
            overflow-x: auto;
            background-color: #1a1a1a;
            padding: 10px 5px;
            border-bottom: 1px solid #2d2d2d;
            gap: 8px;
        }
        .categories-menu::-webkit-scrollbar {
            display: none; /* Прячем полосу прокрутки */
        }
        .category-btn {
            background-color: #262626;
            color: #b3b3b3;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }
        .category-btn.active {
            background-color: #e67e22;
            color: #ffffff;
        }

        /* Сетка товаров */
        .products-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            align-content: start;
            padding-bottom: 80px; /* Чтобы нижняя панель не закрывала товар */
        }

        .product-card {
            background-color: #1c1c1c;
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid #2d2d2d;
        }

        .product-img {
            width: 100%;
            height: 110px;
            object-fit: cover;
            border-radius: 8px;
            background-color: #262626;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }

        .product-name {
            font-size: 14px;
            font-weight: 600;
            margin: 8px 0 4px 0;
            min-height: 34px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-price {
            font-size: 15px;
            font-weight: bold;
            color: #e67e22;
            margin-bottom: 8px;
        }

        .add-btn {
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }
        .add-btn:active {
            background-color: #2980b9;
        }

        /* Нижняя панель */
        .footer-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #1a1a1a;
            border-top: 1px solid #2d2d2d;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .total-price {
            font-size: 16px;
            font-weight: bold;
        }

        .checkout-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }
        .checkout-btn:active {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

    <div class="header">🦅 Магазин «Барсук»</div>

    <div class="categories-menu" id="categories-menu"></div>

    <div class="products-container" id="products-container"></div>

    <div class="footer-panel">
        <div class="total-price" id="total-price">Итого: 0 ₸</div>
        <button class="checkout-btn" onclick="sendOrder()">Оформить</button>
    </div>

    <script>
        // Инициализируем Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Раскрываем на весь экран

        // Сюда будут загружены данные из твоего бота/JSON через специальный мост или эмуляцию
        // Для автономной работы WebApp мы подтягиваем структуру каталога
        let catalogData = {};
        let currentCategory = "";
        let cart = [];

        // Иконки для красоты категорий на сайте
        const categoryEmojis = {
            "soda": "🥤",
            "energy": "⚡",
            "water": "💧",
            "beer": "🍻",
            "wh": "🥃",
            "vd": "🍸",
            "liqueur": "🍹",
            "cognac": "🐴",
            "bb": "🍺",
            "sn": "🍿"
        };

        // Запрашиваем каталог у твоего сервера бота при старте
        // Заглушка каталога (будет заменена реальными данными при связи)
        async function loadCatalog() {
            try {
                // Если бот передает данные при открытии, парсим их
                // В базовой связке используем структуру, идентичную shop_catalog.json
                const response = await fetch('shop_catalog.json');
                catalogData = await response.json();
            } catch (e) {
                // Если файл не прочитался напрямую по относительной ссылке, генерируем структуру
                catalogData = {
                    "beer": {
                        "title": "Разливное пиво (за 1 литр)",
                        "items": [
                            {"name": "Разливное пиво Прага 1.0л", "price": 1100, "status": true},
                            {"name": "Разливное пиво Эрзманн 1.0л", "price": 1290, "status": true},
                            {"name": "Разливное пиво Чешское 1.0л", "price": 1290, "status": true},
                            {"name": "Разливное пиво Жигули 1.0л", "price": 990, "status": true},
                            {"name": "Разливное пиво Шымкентское 1.0л", "price": 990, "status": true},
                            {"name": "Разливное пиво Кит 1.0л", "price": 940, "status": true},
                            {"name": "Разливное пиво Немецкое 1.0л", "price": 1290, "status": true}
                        ]
                    }
                };
            }
            renderCategories();
        }

        // Отрисовка вкладок-категорий
        function renderCategories() {
            const menu = document.getElementById("categories-menu");
            menu.innerHTML = "";
            
            let isFirst = true;
            for (let catId in catalogData) {
                const btn = document.createElement("button");
                btn.className = `category-btn ${isFirst ? 'active' : ''}`;
                const emoji = categoryEmojis[catId] || "📦";
                btn.innerText = `${emoji} ${catalogData[catId].title.replace(/[^а-яА-ЯёЁ\s]/g, "").trim()}`;
                btn.onclick = () => switchCategory(catId, btn);
                menu.appendChild(btn);
                
                if (isFirst) {
                    currentCategory = catId;
                    isFirst = false;
                }
            }
            renderProducts();
        }

        // Переключение вкладок
        function switchCategory(catId, element) {
            document.querySelectorAll(".category-btn").forEach(b => b.classList.remove("active"));
            element.classList.add("active");
            currentCategory = catId;
            renderProducts();
        }

        // Отрисовка карточек товаров
        function renderProducts() {
            const container = document.getElementById("products-container");
            container.innerHTML = "";
            
            if (!catalogData[currentCategory]) return;
            
            catalogData[currentCategory].items.forEach((item, index) => {
                if (item.status === false) return; // Пропускаем скрытые админом товары
                
                const card = document.createElement("div");
                card.className = "product-card";
                
                // Выбираем эмодзи в зависимости от категории для заглушки фото
                const emoji = categoryEmojis[currentCategory] || "🍺";
                
                card.innerHTML = `
                    <div class="product-img">${emoji}</div>
                    <div class="product-name">${item.name}</div>
                    <div class="product-price">${item.price} ₸</div>
                    <button class="add-btn" onclick="addToCart('${item.name}', ${item.price})">В корзину</button>
                `;
                container.appendChild(card);
            });
        }

        // Логика корзины
        function addToCart(name, price) {
            cart.push({name, price});
            updateTotal();
            tg.HapticFeedback.impactOccurred("light"); // Виброотклик при нажатии
        }

        function updateTotal() {
            let total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById("total-price").innerText = `Итого: ${total} ₸`;
        }

        // Отправка заказа обратно в чат боту при нажатии «Оформить»
        function sendOrder() {
            if (cart.length === 0) {
                alert("Ваша корзина пуста!");
                return;
            }
            
            // Формируем данные и отправляем их боту текстом, закрывая WebApp
            tg.sendData(JSON.stringify(cart));
            tg.close();
        }

        // Запуск при загрузке страницы
        loadCatalog();
    </script>
</body>
</html>
