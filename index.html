<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин Барсук</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #222222;
            --tg-theme-button-color: #0088cc;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-hint-color: #888888;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            padding: 0;
            padding-bottom: 90px;
        }

        header {
            background: linear-gradient(135deg, #1e1e1e, #3a3a3a);
            color: #fff;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
        }

        header p {
            margin: 5px 0 0 0;
            font-size: 14px;
            color: #bbb;
        }

        .container {
            padding: 15px;
        }

        .category-section {
            margin-bottom: 25px;
        }

        .category-title {
            font-size: 18px;
            font-weight: bold;
            border-bottom: 2px solid var(--tg-theme-button-color);
            padding-bottom: 5px;
            margin-bottom: 15px;
            color: var(--tg-theme-button-color);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .product-card {
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }

        .product-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            height: 38px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .product-price {
            font-size: 15px;
            color: #e67e22;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .btn {
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            border-radius: 8px;
            padding: 8px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .counter-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .btn-counter {
            background-color: #e0e0e0;
            color: #333;
            border: none;
            border-radius: 8px;
            width: 32px;
            height: 32px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .counter-value {
            font-weight: bold;
            font-size: 14px;
        }

        /* Кнопка Корзины внизу */
        .cart-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
            padding: 15px;
            display: none; /* Показываем, когда есть товары */
            z-index: 1000;
        }

        /* Модальное окно оформления */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #fff;
            padding: 20px;
            border-radius: 16px;
            width: 90%;
            max-width: 360px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .modal-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-cancel {
            background-color: #f1f1f1;
            color: #333;
        }
    </style>
</head>
<body>

    <header>
        <h1>МАГАЗИН «БАРСУК»</h1>
        <p>Круглосуточная витрина товаров</p>
    </header>

    <div class="container" id="catalog-container">
        <p style="text-align:center; color:gray;">Загрузка каталога товаров...</p>
    </div>

    <div class="cart-bar" id="cart-bar">
        <button class="btn" onclick="openOrderModal()">🛒 Перейти в корзину (<span id="cart-count">0</span>)</button>
    </div>

    <div class="modal" id="order-modal">
        <div class="modal-content">
            <div class="modal-title">Оформление заказа</div>
            
            <div class="form-group">
                <label>Ваш номер телефона</label>
                <input type="tel" id="user-phone" class="form-control" placeholder="+7 (707) 123-4567">
            </div>

            <div class="form-group">
                <label>Способ оплаты</label>
                <select id="payment-method" class="form-control">
                    <option value="Kaspi перевод">Kaspi перевод</option>
                    <option value="Наличные курьеру">Наличные курьеру</option>
                </select>
            </div>

            <div style="margin-top:15px; font-weight:bold; font-size:15px;">
                Итого к оплате: <span id="modal-total-price">0</span> ₸
            </div>

            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeOrderModal()">Отмена</button>
                <button class="btn" onclick="sendOrderToBot()">Подтвердить заказ</button>
            </div>
        </div>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем на весь экран

        let catalogData = {};
        let cart = {}; // Хранилище: {"Название товара": {price: 500, count: 2}}

        // Загружаем актуальный shop_catalog.json, созданный ботом
        fetch('shop_catalog.json?v=' + Date.now())
            .then(response => response.json())
            .then(data => {
                catalogData = data;
                renderCatalog();
            })
            .catch(error => {
                console.error("Ошибка загрузки каталога:", error);
                document.getElementById('catalog-container').innerHTML = '<p style="text-align:center; color:red;">Ошибка загрузки товаров. Пожалуйста, откройте магазин заново.</p>';
            });

        // Безопасное Base64 кодирование строк для предотвращения ошибок с кавычками в HTML
        function b64EncodeUnicode(str) {
            return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g,
                function toSolidBytes(match, p1) {
                    return String.fromCharCode('0x' + p1);
            }));
        }

        // Функция раскодирования Base64 при кликах
        function b64DecodeUnicode(str) {
            return decodeURIComponent(atob(str).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
        }

        // Отрисовка каталога на странице
        function renderCatalog() {
            const container = document.getElementById('catalog-container');
            container.innerHTML = ''; // Очищаем текст загрузки

            for (const catKey in catalogData) {
                const category = catalogData[catKey];
                
                // Фильтруем только товары со статусом True (в наличии)
                const activeItems = category.items.filter(item => item.status !== false);
                if (activeItems.length === 0) continue;

                const section = document.createElement('div');
                section.className = 'category-section';

                const title = document.createElement('div');
                title.className = 'category-title';
                title.innerText = category.title;
                section.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'grid';

                activeItems.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'product-card';

                    // Кодируем название в Base64, чтобы кавычки вроде Lay's или Jack Daniel's не ломали onclick атрибуты
                    const encodedName = b64EncodeUnicode(item.name);

                    card.innerHTML = `
                        <div class="product-name">${item.name}</div>
                        <div>
                            <div class="product-price">${item.price} ₸</div>
                            <div id="box-${encodedName}">
                                <button class="btn" onclick="changeQuantity('${encodedName}', 1, ${item.price})">Добавить</button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                section.appendChild(grid);
                container.appendChild(section);
            }
        }

        // Логика изменения количества товара (+ / -)
        function changeQuantity(encodedName, change, price) {
            const name = b64DecodeUnicode(encodedName);
            
            if (!cart[name]) {
                cart[name] = { price: price, count: 0 };
            }

            cart[name].count += change;

            if (cart[name].count <= 0) {
                delete cart[name];
                // Возвращаем обычную кнопку "Добавить"
                document.getElementById(`box-${encodedName}`).innerHTML = `
                    <button class="btn" onclick="changeQuantity('${encodedName}', 1, ${price})">Добавить</button>
                `;
            } else {
                // Рисуем кнопки плюс/минус и текущее количество
                document.getElementById(`box-${encodedName}`).innerHTML = `
                    <div class="counter-container">
                        <button class="btn-counter" onclick="changeQuantity('${encodedName}', -1, ${price})">-</button>
                        <span class="counter-value">${cart[name].count} шт</span>
                        <button class="btn-counter" onclick="changeQuantity('${encodedName}', 1, ${price})">+</button>
                    </div>
                `;
            }

            updateCartBar();
        }

        // Обновление состояния нижней панели корзины
        function updateCartBar() {
            let totalItems = 0;
            let totalPrice = 0;

            for (const name in cart) {
                totalItems += cart[name].count;
                totalPrice += cart[name].count * cart[name].price;
            }

            const cartBar = document.getElementById('cart-bar');
            if (totalItems > 0) {
                cartBar.style.display = 'block';
                document.getElementById('cart-count').innerText = `${totalItems} шт — ${totalPrice} ₸`;
            } else {
                cartBar.style.display = 'none';
            }
        }

        // Открытие модального окна оформления
        function openOrderModal() {
            let totalPrice = 0;
            for (const name in cart) {
                totalPrice += cart[name].count * cart[name].price;
            }
            document.getElementById('modal-total-price').innerText = totalPrice;
            document.getElementById('order-modal').style.display = 'flex';
        }

        // Закрытие модального окна оформления
        function closeOrderModal() {
            document.getElementById('order-modal').style.display = 'none';
        }

        // Отправка данных заказа в Телеграм-бот
        function sendOrderToBot() {
            const phoneInput = document.getElementById('user-phone').value.trim();
            const paymentMethod = document.getElementById('payment-method').value;

            if (!phoneInput) {
                alert("Пожалуйста, введите ваш номер телефона для связи!");
                return;
            }

            // Формируем плоский массив товаров для передачи боту
            const finalItems = [];
            for (const name in cart) {
                for (let i = 0; i < cart[name].count; i++) {
                    finalItems.push({
                        name: name,
                        price: cart[name].price
                    });
                }
            }

            // Собираем полный пакет данных
            const orderData = {
                items: finalItems,
                phone: phoneInput,
                payment: paymentMethod
            };

            // Отправляем данные в Telegram Web App и закрываем окно
            tg.sendData(JSON.stringify(orderData));
            tg.close();
        }
    </script>
</body>
</html>
