<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин Барсук</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #131313;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            user-select: none;
        }
        .header {
            text-align: center;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid #2d2d2d;
            background-color: #1a1a1a;
        }
        .categories-menu {
            display: flex;
            overflow-x: auto;
            background-color: #1a1a1a;
            padding: 10px 5px;
            border-bottom: 1px solid #2d2d2d;
            gap: 8px;
        }
        .categories-menu::-webkit-scrollbar {
            display: none;
        }
        .category-btn {
            background-color: #262626;
            color: #b3b3b3;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }
        .category-btn.active {
            background-color: #e67e22;
            color: #ffffff;
        }
        .products-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            align-content: start;
            padding-bottom: 80px;
        }
        .product-card {
            background-color: #1c1c1c;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid #2d2d2d;
        }
        .product-name {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            min-height: 34px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: #eceff1;
        }
        .product-price {
            font-size: 14px;
            font-weight: bold;
            color: #e67e22;
            margin-bottom: 10px;
        }
        .add-btn {
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 9px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 13px;
        }
        .quantity-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #262626;
            border-radius: 8px;
            padding: 2px;
            width: 100%;
            box-sizing: border-box;
        }
        .q-btn {
            background-color: #e67e22;
            color: white;
            border: none;
            border-radius: 6px;
            width: 32px;
            height: 32px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .q-count {
            font-size: 15px;
            font-weight: bold;
            color: #ffffff;
            min-width: 24px;
            text-align: center;
        }
        .footer-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #1a1a1a;
            border-top: 1px solid #2d2d2d;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .total-price {
            font-size: 15px;
            font-weight: bold;
        }
        .checkout-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .cart-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #131313;
            z-index: 200;
            padding: 20px;
            overflow-y: auto;
            flex-direction: column;
        }
        .modal-header {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2d2d2d;
            padding-bottom: 10px;
        }
        .close-modal {
            background: none;
            border: none;
            color: #e74c3c;
            font-size: 24px;
            cursor: pointer;
        }
        .cart-items-list {
            flex: 1;
            margin-bottom: 20px;
        }
        .cart-item-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #232323;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #b3b3b3;
        }
        .form-input {
            width: 100%;
            background-color: #1a1a1a;
            border: 1px solid #3d3d3d;
            border-radius: 8px;
            padding: 12px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        .radio-group {
            display: flex;
            gap: 12px;
            margin-top: 5px;
        }
        .radio-label {
            flex: 1;
            background-color: #1a1a1a;
            border: 1px solid #3d3d3d;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        .radio-input {
            display: none;
        }
        .radio-input:checked + .radio-label {
            border-color: #e67e22;
            background-color: rgba(230, 126, 34, 0.1);
            color: #e67e22;
        }
        .submit-order-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="header">🦅 Магазин «Барсук»</div>
    <div class="categories-menu" id="categories-menu"></div>
    <div class="products-container" id="products-container"></div>

    <div class="footer-panel">
        <div class="total-price" id="total-price">Итого: 0 ₸</div>
        <button class="checkout-btn" onclick="openCartModal()">Оформить заказ</button>
    </div>

    <div class="cart-modal" id="cart-modal">
        <div class="modal-header">
            <span>Проверка заказа</span>
            <button class="close-modal" onclick="closeCartModal()">✕</button>
        </div>
        <div class="cart-items-list" id="cart-items-list"></div>
        <div class="form-group">
            <label for="user-phone">📞 Ваш номер телефона:</label>
            <input type="tel" id="user-phone" class="form-input" placeholder="+7 (707) 123-45-67">
        </div>
        <div class="form-group">
            <label>💰 Способ оплаты:</label>
            <div class="radio-group">
                <input type="radio" id="pay-kaspi" name="payment" value="Kaspi перевод" checked class="radio-input">
                <label for="pay-kaspi" class="radio-label">Kaspi перевод</label>
                <input type="radio" id="pay-cash" name="payment" value="Наличными" class="radio-input">
                <label for="pay-cash" class="radio-label">Наличными</label>
            </div>
        </div>
        <div style="font-size: 18px; font-weight: bold; margin: 20px 0; text-align: right;" id="modal-total">Итого: 0 ₸</div>
        <button class="submit-order-btn" onclick="sendFinalOrder()">Подтвердить заказ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let cartState = {};

        const catalogData = {
            "beer": {
                "title": "🍻 Разливное пиво",
                "items": [
                    {"name": "Разливное пиво Прага 1.0л", "price": 1090},

                    {"name": "Разливное пиво Чешское 1.0л", "price": 1290},
                    {"name": "Разливное пиво Жигули 1.0л", "price": 990},
                    {"name": "Разливное пиво Шымкентское 1.0л", "price": 990},
                    {"name": "Разливное пиво Кит 1.0л", "price": 940},
                    {"name": "Разливное пиво Немецкое 1.0л", "price": 1290}
                ]
            },
            "soda": {
                "title": "🥤 Напитки и Соки",
                "items": [
                    {"name": "Coca-Cola 0.5л", "price": 590},
                    {"name": "Coca-Cola 1.0л", "price": 890},
                    {"name": "Fanta Orange 0.5л", "price": 590},
                    {"name": "Fanta Orange 1.0л", "price": 890},
                    {"name": "Sprite 0.5л", "price": 590},
                    {"name": "Sprite 1.0л", "price": 890},
                    {"name": "Pepsi-Cola 0.5л", "price": 590},
                    {"name": "Pepsi-Cola 1.0л", "price": 890},
                    {"name": "Сок Piko Ананас 1.0л", "price": 1490},
                    {"name": "Сок Piko Яблоко 1.0л", "price": 1490},
                    {"name": "Сок Piko Вишня 1.0л", "price": 1490},
                    {"name": "Сок Piko Апельсин 1.0л", "price": 1490}
                ]
            },
            "energy": {
                "title": "⚡ Энергетики",
                "items": [
                    {"name": "Энергетик Dizzy Original 0.33л", "price": 790},
                    {"name": "Энергетик Red Bull 0.25л", "price": 1150},
                    {"name": "Энергетик Gorilla Classic 0.45л", "price": 890}
                ]
            },
            "water": {
                "title": "💧 Питьевая вода",
                "items": [
                    {"name": "Вода Samal 0.5л", "price": 550},
                    {"name": "Вода Samal 1.0л", "price": 750},
                    {"name": "Вода Bonaqua 0.5л", "price": 550},
                    {"name": "Вода Bonaqua 1.0л", "price": 750}
                ]
            },
            "wh": {
                "title": "🥃 Виски",
                "items": [
                    {"name": "Виски Ballantine's Finest 0.5л", "price": 8500},
                    {"name": "Виски Jack Daniel's Tennessee 0.7л", "price": 17900},
                    {"name": "Виски Monkey Shoulder 0.7л", "price": 29500},
                    {"name": "Виски J&B Rare 0.5л", "price": 9000},
                    {"name": "Виски Clan MacGregor 0.5л", "price": 7000},
                    {"name": "Виски William Lawson's 1.0л", "price": 11000},
                    {"name": "Виски Jameson Irish Whiskey 0.5л", "price": 11900},
                    {"name": "Виски Johnnie Walker Red Label 0.5л", "price": 10900},
                    {"name": "Виски Bell's Original 0.5л", "price": 7000}
                ]
            },
            "vd": {
                "title": "🍸 Водка",
                "items": [
                    {"name": "Водка Beluga Premium (со стаканом) 0.7л", "price": 26000},
                    {"name": "Водка Qazaq Eli Nomad 0.5л", "price": 7000},
                    {"name": "Водка Хортиця Ice 0.7л", "price": 4350},
                    {"name": "Водка Nemiroff Lex 0.5л", "price": 11990},
                    {"name": "Водка Absolut Blue 0.5л", "price": 7900},
                    {"name": "Водка Finlandia 0.5л", "price": 7900},
                    {"name": "Водка Синяя гора 0.5л", "price": 3500},
                    {"name": "Водка Хаома 0.5л", "price": 3500}
                ]
            },
            "liqueur": {
                "title": "🍹 Ликеры, Апероль и Текила",
                "items": [
                    {"name": "Ликер Jagermeister (с 4 шотами) 1.0л", "price": 16700},
                    {"name": "Ликер Jagermeister 0.5л", "price": 11900},
                    {"name": "Аперитив Aperol 1.0л", "price": 16750},
                    {"name": "Игристое вино Martini Asti 0.75л", "price": 6000},
                    {"name": "Текила Olmeca Gold 0.5л", "price": 9500},
                    {"name": "Текила Olmeca Silver 0.5л", "price": 9500}
                ]
            },
            "cognac": {
                "title": "🐴 Коньяк",
                "items": [
                    {"name": "Коньяк Бахус Vintage 0.5л", "price": 2500},
                    {"name": "Коньяк Казахстан 5 звезд 0.5л", "price": 5900},
                    {"name": "Коньяк Арарат 5 звезд 0.5л", "price": 6500}
                ]
            },
            "bb": {
                "title": "🍺 Пиво в бутылках",
                "items": [
                    {"name": "Пиво Шымкентское Светлое 0.45л", "price": 560},
                    {"name": "Пиво Жигулевское Особое 0.5л", "price": 520},
                    {"name": "Пиво Белый Медведь Светлое 0.45л", "price": 580},
                    {"name": "Пиво Балтика №3 Классическое 0.45л", "price": 620},
                    {"name": "Пиво Балтика №7 Экспортное 0.45л", "price": 670},
                    {"name": "Пиво Балтика №9 Крепкое 0.45л", "price": 690},
                    {"name": "Пиво Bud Светлое 0.45л", "price": 810},
                    {"name": "Пиво Старопрамен Светлое 0.45л", "price": 830},
                    {"name": "Пиво Туборг Грин Светлое 0.45л", "price": 740},
                    {"name": "Пиво Хайнекен Светлое 0.45л", "price": 1010},
                    {"name": "Пиво Стелла Артуа Светлое 0.45л", "price": 1050},
                    {"name": "Пиво Хугарден Белое Нефильтрованное 0.45л", "price": 1230},
                    {"name": "Пиво Корона Экстра Светлое 0.355л", "price": 1190},
                    {"name": "Пиво Жатецкий Гусь Светлое 0.45л", "price": 610},
                    {"name": "Пиво Эфес Казахстан Светлое 0.45л", "price": 580},
                    {"name": "Пиво Крушовице Светлое 0.45л", "price": 810},
                    {"name": "Пиво Миллер Дженуин Драфт 0.45л", "price": 1020},
                    {"name": "Пивой напиток Эсса Грейпфрут-Ананас 0.45л", "price": 830},
                    {"name": "Пивной напиток Гараж Хард Лимонный Чай 0.45л", "price": 730},
                    {"name": "Пивной напиток Гараж Хард Брусничный 0.45л", "price": 730}
                ]
            },
            "sn": {
                "title": "🍿 Закуски и Снеки",
                "items": [
                    {"name": "Сыр Чечел копченый (косичка)", "price": 950},
                    {"name": "Сыр Чечел молочный (косичка)", "price": 950},
                    {"name": "Семечки Джинн (Большая пачка)", "price": 650},
                    {"name": "Арахис соленый к пиву", "price": 550},
                    {"name": "Чипсы Lay's в ассортименте", "price": 1250},
                    {"name": "Курт домашний (порция)", "price": 700}
                ]
            }
        };

        let currentCategory = "beer";

        function renderCategories() {
            const menu = document.getElementById("categories-menu");
            menu.innerHTML = "";
            for (let catId in catalogData) {
                const btn = document.createElement("button");
                btn.className = `category-btn ${catId === currentCategory ? 'active' : ''}`;
                btn.innerText = catalogData[catId].title;
                btn.onclick = () => {
                    document.querySelectorAll(".category-btn").forEach(b => b.classList.remove("active"));
                    btn.classList.add("active");
                    currentCategory = catId;
                    renderProducts();
                };
                menu.appendChild(btn);
            }
        }

        function renderProducts() {
            const container = document.getElementById("products-container");
            container.innerHTML = "";
            
            catalogData[currentCategory].items.forEach(item => {
                const card = document.createElement("div");
                card.className = "product-card";
                const currentCount = cartState[item.name] || 0;
                
                const encodedName = btoa(encodeURIComponent(item.name));
                const safeId = encodedName.replace(/=/g, '');
                
                let actionButtonHTML = currentCount > 0 ? `
                    <div class="quantity-control">
                        <button class="q-btn" onclick="changeQuantity('${encodedName}', ${item.price}, -1)">−</button>
                        <span class="q-count">${currentCount}</span>
                        <button class="q-btn" onclick="changeQuantity('${encodedName}', ${item.price}, 1)">+</button>
                    </div>
                ` : `
                    <button class="add-btn" onclick="changeQuantity('${encodedName}', ${item.price}, 1)">В корзину</button>
                `;

                card.innerHTML = `
                    <div class="product-name">${item.name}</div>
                    <div class="product-price">${item.price} ₸</div>
                    <div id="action-block-${safeId}">${actionButtonHTML}</div>
                `;
                container.appendChild(card);
            });
        }

        function changeQuantity(encodedName, price, delta) {
            const name = decodeURIComponent(atob(encodedName));
            const currentCount = cartState[name] || 0;
            const newCount = currentCount + delta;
            
            if (newCount <= 0) {
                delete cartState[name];
            } else {
                cartState[name] = newCount;
            }
            
            const safeId = encodedName.replace(/=/g, '');
            const block = document.getElementById(`action-block-${safeId}`);
            if (block) {
                block.innerHTML = newCount > 0 ? `
                    <div class="quantity-control">
                        <button class="q-btn" onclick="changeQuantity('${encodedName}', ${price}, -1)">−</button>
                        <span class="q-count">${newCount}</span>
                        <button class="q-btn" onclick="changeQuantity('${encodedName}', ${price}, 1)">+</button>
                    </div>
                ` : `
                    <button class="add-btn" onclick="changeQuantity('${encodedName}', ${price}, 1)">В корзину</button>
                `;
            }
            updateTotal();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred("light");
        }

        function calculateTotal() {
            let realTotal = 0;
            for (let catId in catalogData) {
                catalogData[catId].items.forEach(item => {
                    if (cartState[item.name]) {
                        realTotal += item.price * cartState[item.name];
                    }
                });
            }
            return realTotal;
        }

        function updateTotal() {
            let total = calculateTotal();
            document.getElementById("total-price").innerText = `Итого: ${total} ₸`;
        }

        function openCartModal() {
            const total = calculateTotal();
            if (total === 0) {
                alert("Ваша корзина пуста!");
                return;
            }

            const listContainer = document.getElementById("cart-items-list");
            listContainer.innerHTML = "";
            
            for (let name in cartState) {
                let itemPrice = 0;
                for (let catId in catalogData) {
                    let found = catalogData[catId].items.find(i => i.name === name);
                    if (found) itemPrice = found.price;
                }
                
                const count = cartState[name];
                const row = document.createElement("div");
                row.className = "cart-item-row";
                row.innerHTML = `
                    <span>${name} <b>x${count}</b></span>
                    <span>${itemPrice * count} ₸</span>
                `;
                listContainer.appendChild(row);
            }

            document.getElementById("modal-total").innerText = `Итого: ${total} ₸`;
            document.getElementById("cart-modal").style.display = "flex";
        }

        function closeCartModal() {
            document.getElementById("cart-modal").style.display = "none";
        }

        function sendFinalOrder() {
            const phoneInput = document.getElementById("user-phone").value.trim();
            const paymentMethod = document.querySelector('input[name="payment"]:checked').value;

            if (!phoneInput || phoneInput.length < 7) {
                alert("Пожалуйста, введите корректный номер телефона!");
                return;
            }

            let flatCart = [];
            for (let catId in catalogData) {
                catalogData[catId].items.forEach(item => {
                    const count = cartState[item.name] || 0;
                    for (let i = 0; i < count; i++) {
                        flatCart.push({
                            name: item.name,
                            price: item.price
                        });
                    }
                });
            }

            const orderPayload = {
                items: flatCart,
                phone: phoneInput,
                payment: paymentMethod
            };

            tg.sendData(JSON.stringify(orderPayload));
            tg.close();
        }

        renderCategories();
        renderProducts();
    </script>
</body>
</html>
