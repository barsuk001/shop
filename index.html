<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Барсук Онлайн</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #222222);
            margin: 0;
            padding: 10px;
        }
        .header {
            text-align: center;
            padding: 10px 0;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 1px solid var(--tg-theme-hint-color, #ccc);
            margin-bottom: 15px;
        }
        .catalog {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding-bottom: 80px;
        }
        .product-card {
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .product-img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            background-color: #e0e0e0;
        }
        .product-name {
            font-size: 14px;
            font-weight: 600;
            margin: 8px 0 4px 0;
            height: 38px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .product-price {
            font-size: 15px;
            font-weight: bold;
            color: #e67e22;
            margin-bottom: 8px;
        }
        .btn-add {
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            padding: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .counter-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #ddd;
            border-radius: 8px;
            overflow: hidden;
        }
        .counter-btn {
            background-color: #ccc;
            border: none;
            padding: 8px 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        .counter-value {
            font-weight: bold;
            font-size: 14px;
        }
        /* Стили для нижней плашки с кнопкой заказа */
        .footer-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--tg-theme-bg-color, #ffffff);
            padding: 12px;
            box-shadow: 0 -3px 10px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .total-price {
            font-size: 16px;
            font-weight: bold;
        }
        .btn-order {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="header">🦅 Магазин «Барсук»</div>
    
    <div class="catalog" id="catalog"></div>

    <div class="footer-bar">
        <div class="total-price">Итого: <span id="total-sum">0</span> ₸</div>
        <button class="btn-order" id="btn-order" onclick="sendOrder()">Оформить</button>
    </div>

    <script>
        // Инициализируем Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем на весь экран смартфона

        // Имитация базы данных товаров (Сюда потом пропишем реальные ссылки на фото)
        const products = [
            { id: "p1", name: "Разливное пиво Прага 1.0л", price: 1090, img: "https://images.unsplash.com/photo-1566633806327-68e152aaf26d?w=400" },
            { id: "p2", name: "Разливное пиво Жигули 1.0л", price: 990, img: "https://images.unsplash.com/photo-1532634922-8fe0b757fb13?w=400" },
            { id: "p3", name: "Виски Jack Daniel's 0.7л", price: 17900, img: "https://images.unsplash.com/photo-1527281400683-1aae777175f8?w=400" },
            { id: "p4", name: "Чипсы Lay's в ассортименте", price: 1250, img: "https://images.unsplash.com/photo-1566478989037-eec170784d0b?w=400" }
        ];

        const cart = {};

        // Функция рендеринга карточек
        function renderCatalog() {
            const catalogDiv = document.getElementById('catalog');
            catalogDiv.innerHTML = '';

            products.forEach(prod => {
                const count = cart[prod.id] ? cart[prod.id].count : 0;
                let actionHtml = `<button class="btn-add" onclick="addToCart('${prod.id}')">В корзину</button>`;
                
                if (count > 0) {
                    actionHtml = `
                        <div class="counter-container">
                            <button class="counter-btn" onclick="changeCount('${prod.id}', -1)">-</button>
                            <span class="counter-value">${count} шт</span>
                            <button class="counter-btn" onclick="changeCount('${prod.id}', 1)">+</button>
                        </div>
                    `;
                }

                catalogDiv.innerHTML += `
                    <div class="product-card">
                        <img class="product-img" src="${prod.img}" alt="${prod.name}">
                        <div class="product-name">${prod.name}</div>
                        <div class="product-price">${prod.price} ₸</div>
                        ${actionHtml}
                    </div>
                `;
            });
            updateTotal();
        }

        function addToCart(id) {
            const prod = products.find(p => p.id === id);
            cart[id] = { name: prod.name, price: prod.price, count: 1 };
            renderCatalog();
        }

        function changeCount(id, delta) {
            if (!cart[id]) return;
            cart[id].count += delta;
            if (cart[id].count <= 0) {
                delete cart[id];
            }
            renderCatalog();
        }

        function updateTotal() {
            let total = 0;
            for (const id in cart) {
                total += cart[id].price * cart[id].count;
            }
            document.getElementById('total-sum').innerText = total;
        }

        // Отправка данных обратно в бота при клике на "Оформить"
        function sendOrder() {
            let orderItems = [];
            for (const id in cart) {
                orderItems.push(cart[id]);
            }
            
            if (orderItems.length === 0) {
                alert("Корзина пуста!");
                return;
            }

            // Передаем собранную корзину обратно в Python в виде JSON строки
            tg.sendData(JSON.stringify(orderItems));
            tg.close(); // Закрываем Web App окно
        }

        // Первый запуск витрины
        renderCatalog();
    </script>
</body>
</html>
