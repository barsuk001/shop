<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин Барсук</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #131313;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            -webkit-user-select: none;
            user-select: none;
        }

        .header {
            text-align: center;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid #2d2d2d;
            background-color: #1a1a1a;
        }

        /* Горизонтальное меню категорий */
        .categories-menu {
            display: flex;
            overflow-x: auto;
            background-color: #1a1a1a;
            padding: 10px 8px;
            border-bottom: 1px solid #2d2d2d;
            gap: 8px;
        }
        .categories-menu::-webkit-scrollbar {
            display: none;
        }
        .category-btn {
            background-color: #262626;
            color: #b3b3b3;
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .category-btn.active {
            background-color: #e67e22;
            color: #ffffff;
        }

        /* Контейнер товаров */
        .products-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            align-content: start;
            padding-bottom: 90px;
        }

        .product-card {
            background-color: #1c1c1c;
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid #2d2d2d;
        }

        .product-img {
            width: 100%;
            height: 90px;
            border-radius: 8px;
            background-color: #262626;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .product-name {
            font-size: 13px;
            font-weight: 600;
            margin: 8px 0 4px 0;
            min-height: 34px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }

        .product-price {
            font-size: 14px;
            font-weight: bold;
            color: #e67e22;
            margin-bottom: 8px;
        }

        .add-btn {
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 12px;
            -webkit-tap-highlight-color: transparent;
        }
        .add-btn:active {
            background-color: #2980b9;
        }

        /* Нижняя плашка */
        .footer-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #1a1a1a;
            border-top: 1px solid #2d2d2d;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .total-price {
            font-size: 15px;
            font-weight: bold;
        }

        .checkout-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 22px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .checkout-btn:active {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

    <div class="header">🦅 Магазин «Барсук»</div>

    <div class="categories-menu" id="categories-menu"></div>

    <div class="products-container" id="products-container"></div>

    <div class="footer-panel">
        <div class="total-price" id="total-price">Итого: 0 ₸</div>
        <button class="checkout-btn" onclick="sendOrder()">Оформить</button>
    </div>

    <script>

        // 📦 ТВОЯ ПОЛНАЯ БАЗА ТОВАРОВ

                "items": [

                    {"name": "Пивной напиток Гараж Брусника 0.45л", "price": 730}
                ]
            },
            "sn": {
                "title": "🍿 Закуски",
                "items": [
                    {"name": "Сыр Чечел копченый (косичка)", "price": 950},
                    {"name": "Сыр Чечел молочный (косичка)", "price": 950},
                    {"name": "Семечки Джинн (Большая пачка)", "price": 650},
                    {"name": "Арахис соленый к пиву", "price": 550},
                    {"name": "Чипсы Lay's в ассортименте", "price": 1250},
                    {"name": "Курт домашний (порция)", "price": 700}
                ]
            }
        };

        let currentCategory = "beer";
        let cart = [];

        // Отрисовка верхних кнопок-категорий
        function renderCategories() {
            const menu = document.getElementById("categories-menu");
            menu.innerHTML = "";
            
            for (let catId in catalogData) {
                const btn = document.createElement("button");
                btn.className = `category-btn ${catId === currentCategory ? 'active' : ''}`;
                btn.innerText = catalogData[catId].title;
                btn.onclick = (function(id, element) {
                    return function() {
                        switchCategory(id, this);
                    };
                })(catId, btn);
                menu.appendChild(btn);
            }
        }

        // Переключение категорий
        function switchCategory(catId, element) {
            document.querySelectorAll(".category-btn").forEach(b => b.classList.remove("active"));
            element.classList.add("active");
            currentCategory = catId;
            renderProducts();
        }

        // Отрисовка товаров
        function renderProducts() {
            const container = document.getElementById("products-container");
            container.innerHTML = "";
            
            const category = catalogData[currentCategory];
            if (!category) return;
            
            const emoji = category.title.split(" ")[0] || "🍺";
            
            category.items.forEach((item) => {
                const card = document.createElement("div");
                card.className = "product-card";
                card.innerHTML = `
                    <div class="product-img">${emoji}</div>
                    <div class="product-name">${item.name}</div>
                    <div class="product-price">${item.price} ₸</div>
                    <button class="add-btn" onclick="addToCart('${item.name}', ${item.price})">В корзину</button>
                `;
                container.appendChild(card);
            });
        }

        // Логика корзины
        function addToCart(name, price) {
            cart.push({name, price});
            updateTotal();
            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred("light");
            }
        }

        function updateTotal() {
            let total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById("total-price").innerText = `Итого: ${total} ₸`;
        }

        // Отправка данных боту
        function sendOrder() {
            if (cart.length === 0) {
                alert("Ваша корзина пуста!");
                return;
            }
            if (tg) {
                tg.sendData(JSON.stringify(cart));
                tg.close();
            }
        }

        // Запуск интерфейса
        window.onload = function() {
            renderCategories();
            renderProducts();
        };
    </script>
</body>
</html>
