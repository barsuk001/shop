<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин Барсук</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #131313;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            -webkit-user-select: none;
            user-select: none;
        }

        .header {
            text-align: center;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid #2d2d2d;
            background-color: #1a1a1a;
        }

        .categories-container {
            background-color: #1a1a1a;
            border-bottom: 1px solid #2d2d2d;
            padding: 10px 0;
        }

        .categories-menu {
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding: 0 10px;
            gap: 10px;
            -webkit-overflow-scrolling: touch;
        }

        .categories-menu::-webkit-scrollbar {
            display: none;
        }

        .category-btn {
            background-color: #262626;
            color: #b3b3b3;
            border: 1px solid #3d3d3d;
            padding: 10px 18px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .category-btn.active {
            background-color: #e67e22;
            color: #ffffff;
            border-color: #e67e22;
        }

        .products-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            align-content: start;
            padding-bottom: 100px;
        }

        .product-card {
            background-color: #1c1c1c;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid #2d2d2d;
        }

        .product-img {
            width: 100%;
            height: 90px;
            border-radius: 8px;
            background-color: #262626;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .product-name {
            font-size: 13px;
            font-weight: 600;
            margin: 8px 0 4px 0;
            min-height: 34px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }

        .product-price {
            font-size: 14px;
            font-weight: bold;
            color: #e67e22;
            margin-bottom: 8px;
        }

        .add-btn {
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 13px;
        }

        /* Кнопки управления количеством товара (+/-) */
        .quantity-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #262626;
            border-radius: 8px;
            border: 1px solid #3d3d3d;
            overflow: hidden;
        }

        .qty-btn {
            background-color: #3d3d3d;
            color: white;
            border: none;
            width: 35px;
            height: 36px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .qty-btn:active {
            background-color: #e67e22;
        }

        .qty-num {
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
        }

        .footer-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #1a1a1a;
            border-top: 1px solid #2d2d2d;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .total-price {
            font-size: 16px;
            font-weight: bold;
        }

        .checkout-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 25px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .checkout-btn:active {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

            "sn": {

                "items": [

                    {"id": "sn2", "name": "Сыр Чечел молочный (косичка)", "price": 950},
                    {"id": "sn3", "name": "Семечки Джинн (Большая пачка)", "price": 650},

                    {"id": "sn6", "name": "Курт домашний (порция)", "price": 700}

        };

        let currentCategory = "beer";
        let cart = {}; 

        function initStore() {
            const menu = document.getElementById("categories-menu");
            menu.innerHTML = "";
            
            for (let key in catalogData) {
                const btn = document.createElement("button");
                btn.type = "button";
                btn.className = key === currentCategory ? "category-btn active" : "category-btn";
                btn.innerText = catalogData[key].title;
                btn.setAttribute("onclick", "changeCategory('" + key + "')");
                btn.id = "btn-" + key;
                menu.appendChild(btn);
            }
            renderItems();
        }

        function changeCategory(key) {
            currentCategory = key;
            document.querySelectorAll(".category-btn").forEach(b => b.classList.remove("active"));
            const activeBtn = document.getElementById("btn-" + key);
            if (activeBtn) activeBtn.classList.add("active");
            renderItems();
        }

        function renderItems() {
            const container = document.getElementById("products-container");
            container.innerHTML = "";
            
            const activeData = catalogData[currentCategory];
            if (!activeData) return;
            
            const emoji = activeData.title.split(" ")[0] || "📦";
            
            activeData.items.forEach(function(item) {
                const inCart = cart[item.id];
                let buttonHTML = "";
                
                if (inCart && inCart.quantity > 0) {
                    buttonHTML = `
                        <div class="quantity-control" id="block-${item.id}">
                            <button class="qty-btn" type="button" onclick="updateQty('${item.id}', -1)">-</button>
                            <span class="qty-num">${inCart.quantity} шт</span>
                            <button class="qty-btn" type="button" onclick="updateQty('${item.id}', 1)">+</button>
                        </div>
                    `;
                } else {
                    buttonHTML = `
                        <button class="add-btn" type="button" onclick="addItem('${item.id}', '${item.name.replace(/'/g, "\\'")}', ${item.price})">В корзину</button>
                    `;
                }

                const card = document.createElement("div");
                card.className = "product-card";
                card.innerHTML = `
                    <div class="product-img">${emoji}</div>
                    <div class="product-name">${item.name}</div>
                    <div class="product-price">${item.price} ₸</div>
                    <div id="action-${item.id}">${buttonHTML}</div>
                `;
                container.appendChild(card);
            });
        }

        function addItem(id, name, price) {
            cart[id] = { name: name, price: price, quantity: 1 };
            updateUI(id);
            if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred("light");
        }

        function updateQty(id, delta) {
            if (!cart[id]) return;
            
            cart[id].quantity += delta;
            if (cart[id].quantity <= 0) {
                delete cart[id]; 
            }
            
            updateUI(id);
            if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred("light");
        }

        function updateUI(id) {
            const actionContainer = document.getElementById("action-" + id);
            
            if (actionContainer) {
                const itemInCart = cart[id];
                if (itemInCart && itemInCart.quantity > 0) {
                    actionContainer.innerHTML = `
                        <div class="quantity-control">
                            <button class="qty-btn" type="button" onclick="updateQty('${id}', -1)">-</button>
                            <span class="qty-num">${itemInCart.quantity} шт</span>
                            <button class="qty-btn" type="button" onclick="updateQty('${id}', 1)">+</button>
                        </div>
                    `;
                } else {
                    let foundItem = null;
                    for (let key in catalogData) {
                        let matched = catalogData[key].items.find(i => i.id === id);
                        if (matched) { foundItem = matched; break; }
                    }
                    if (foundItem) {
                        actionContainer.innerHTML = `
                            <button class="add-btn" type="button" onclick="addItem('${id}', '${foundItem.name.replace(/'/g, "\\'")}', ${foundItem.price})">В корзину</button>
                        `;
                    }
                }
            }
            
            let totalSum = 0;
            let totalCount = 0;
            
            for (let key in cart) {
                totalSum += cart[key].price * cart[key].quantity;
                totalCount += cart[key].quantity;
            }
            
            document.getElementById("total-price").innerText = "Итого: " + totalSum + " ₸";
            
            const checkoutBtn = document.getElementById("checkout-btn");
            if (totalCount > 0) {
                checkoutBtn.innerText = "Оформить (" + totalCount + " шт)";
            } else {
                checkoutBtn.innerText = "Оформить";
            }
        }

        function sendOrder() {
            let orderArray = [];
            for (let key in cart) {
                orderArray.push({
                    name: cart[key].name,
                    price: cart[key].price,
                    quantity: cart[key].quantity
                });
            }
            
            if (orderArray.length === 0) {
                alert("Ваша корзина пуста!");
                return;
            }
            
            if (tg) {
                tg.sendData(JSON.stringify(orderArray));
                tg.close();
            } else {
                alert("Заказ оформлен:\n" + JSON.stringify(orderArray, null, 2));
            }
        }

        window.addEventListener("DOMContentLoaded", initStore);
    </script>
</body>
</html>
