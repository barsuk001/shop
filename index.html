<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин Барсук</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #131313;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            user-select: none;
        }
        .header {
            text-align: center;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid #2d2d2d;
            background-color: #1a1a1a;
        }
        .categories-menu {
            display: flex;
            overflow-x: auto;
            background-color: #1a1a1a;
            padding: 10px 5px;
            border-bottom: 1px solid #2d2d2d;
            gap: 8px;
        }
        .categories-menu::-webkit-scrollbar {
            display: none;
        }
        .category-btn {
            background-color: #262626;
            color: #b3b3b3;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }
        .category-btn.active {
            background-color: #e67e22;
            color: #ffffff;
        }
        .products-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            align-content: start;
            padding-bottom: 80px;
        }
        .product-card {
            background-color: #1c1c1c;
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid #2d2d2d;
        }
        .product-img {
            width: 100%;
            height: 90px;
            object-fit: cover;
            border-radius: 8px;
            background-color: #262626;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        .product-name {
            font-size: 13px;
            font-weight: 600;
            margin: 8px 0 4px 0;
            min-height: 34px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: #eceff1;
        }
        .product-price {
            font-size: 14px;
            font-weight: bold;
            color: #e67e22;
            margin-bottom: 8px;
        }
        .add-btn {
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 12px;
        }
        .add-btn:active {
            background-color: #2980b9;
        }
        .footer-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #1a1a1a;
            border-top: 1px solid #2d2d2d;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .total-price {
            font-size: 15px;
            font-weight: bold;
        }
        .checkout-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">🦅 Магазин «Барсук»</div>
    <div class="categories-menu" id="categories-menu"></div>
    <div class="products-container" id="products-container"></div>

    <div class="footer-panel">
        <div class="total-price" id="total-price">Итого: 0 ₸</div>
        <button class="checkout-btn" onclick="sendOrder()">Оформить заказ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Полная база данных, зашитая прямо в сайт, чтобы ничего не терялось!
        const catalogData = {

                    {"name": "Разливное пиво Чешское 1.0л", "price": 1290},
                    {"name": "Разливное пиво Жигули 1.0л", "price": 990},
                    {"name": "Разливное пиво Шымкентское 1.0л", "price": 990},
                    {"name": "Разливное пиво Кит 1.0л", "price": 940},
                    {"name": "Разливное пиво Немецкое 1.0л", "price": 1290}
                ]
            },
            "soda": {
                "title": "🥤 Напитки и Соки",
                "items": [
                    {"name": "Coca-Cola 0.5л", "price": 590},
                    {"name": "Coca-Cola 1.0л", "price": 890},
                    {"name": "Fanta Orange 0.5л", "price": 590},

                    {"name": "Sprite 0.5л", "price": 590},

                    {"name": "Pepsi-Cola 0.5л", "price": 590},
                    {"name": "Pepsi-Cola 1.0л", "price": 890},
                    {"name": "Сок Piko Ананас 1.0л", "price": 1490},
                    {"name": "Сок Piko Яблоко 1.0л", "price": 1490},
                    {"name": "Сок Piko Вишня 1.0л", "price": 1490},
                    {"name": "Сок Piko Апельсин 1.0л", "price": 1490}
                ]
            },
            "energy": {
                "title": "⚡ Энергетики",
                "items": [
                    {"name": "Энергетик Dizzy Original 0.33л", "price": 790},
                    {"name": "Энергетик Red Bull 0.25л", "price": 1150},
                    {"name": "Энергетик Gorilla Classic 0.45л", "price": 890}
                ]
            },
            "water": {
                "title": "💧 Вода",
                "items": [
                    {"name": "Вода Samal 0.5л", "price": 550},
                    {"name": "Вода Samal 1.0л", "price": 750},
                    {"name": "Вода Bonaqua 0.5л", "price": 550},
                    {"name": "Вода Bonaqua 1.0л", "price": 750}
                ]
            },
            "wh": {
                "title": "🥃 Виски",
                "items": [
                    {"name": "Виски Ballantine's Finest 0.5л", "price": 8500},
                    {"name": "Виски Jack Daniel's Tennessee 0.7л", "price": 17900},
                    {"name": "Виски Monkey Shoulder 0.7л", "price": 29500},
                    {"name": "Виски J&B Rare 0.5л", "price": 9000},
                    {"name": "Виски Clan MacGregor 0.5л", "price": 7000},
                    {"name": "Виски William Lawson's 1.0л", "price": 11000},
                    {"name": "Виски Jameson 0.5л", "price": 11900},
                    {"name": "Виски JW Red Label 0.5л", "price": 10900},
                    {"name": "Виски Bell's Original 0.5л", "price": 7000}
                ]
            },
            "vd": {
                "title": "🍸 Водка",
                "items": [

                    {"name": "Водка Absolut Blue 0.5л", "price": 7900},
                    {"name": "Водка Finlandia 0.5л", "price": 7900},
                    {"name": "Водка Синяя гора 0.5л", "price": 3500},
                    {"name": "Водка Хаома 0.5л", "price": 3500}
                ]
            },
            "liqueur": {
                "title": "🍹 Ликеры & Текила",
                "items": [
                    {"name": "Ликер Jagermeister 1.0л", "price": 16700},
                    {"name": "Ликер Jagermeister 0.5л", "price": 11900},
                    {"name": "Аперитив Aperol 1.0л", "price": 16750},
                    {"name": "Martini Asti 0.75л", "price": 6000},
                    {"name": "Текила Olmeca Gold 0.5л", "price": 9500},
                    {"name": "Текила Olmeca Silver 0.5л", "price": 9500},
                    {"name": "Джин в ассортименте 0.5л", "price": 13900},
                    {"name": "Ликер Baileys Original 0.5л", "price": 11900}
                ]
            },
            "cognac": {
                "title": "🐴 Коньяк",
                "items": [
                    {"name": "Коньяк Бахус Vintage 0.5л", "price": 2500},
                    {"name": "Коньяк Казахстан 5* 0.5л", "price": 5900},
                    {"name": "Коньяк Арарат 5* 0.5л", "price": 6500}
                ]
            },
            "bb": {
                "title": "🍺 Бутылочное пиво",
                "items": [
                    {"name": "Пиво Шымкентское 0.45л", "price": 560},
                    {"name": "Пиво Жигулевское Особое 0.5л", "price": 520},
                    {"name": "Пиво Белый Медведь 0.45л", "price": 580},
                    {"name": "Пиво Балтика №3 0.45л", "price": 620},
                    {"name": "Пиво Балтика №7 0.45л", "price": 670},
                    {"name": "Пиво Bud Светлое 0.45л", "price": 810},
                    {"name": "Пиво Хайнекен 0.45л", "price": 1010},
                    {"name": "Пиво Корона Экстра 0.355л", "price": 1190}
                ]
            },
            "sn": {
                "title": "🍿 Закуски",
                "items": [
                    {"name": "Сыр Чечел копченый", "price": 950},
                    {"name": "Сыр Чечел молочный", "price": 950},
                    {"name": "Семечки Джинн (Большая)", "price": 650},
                    {"name": "Арахис соленый к пиву", "price": 550},
                    {"name": "Чипсы Lay's в ассорт.", "price": 1250},
                    {"name": "Курт домашний (порция)", "price": 700}
                ]
            }
        };

        let currentCategory = "beer";
        let cart = [];

        function renderCategories() {
            const menu = document.getElementById("categories-menu");
            menu.innerHTML = "";
            for (let catId in catalogData) {
                const btn = document.createElement("button");
                btn.className = `category-btn ${catId === currentCategory ? 'active' : ''}`;
                btn.innerText = catalogData[catId].title;
                btn.onclick = () => {
                    document.querySelectorAll(".category-btn").forEach(b => b.classList.remove("active"));
                    btn.classList.add("active");
                    currentCategory = catId;
                    renderProducts();
                };
                menu.appendChild(btn);
            }
        }

        function renderProducts() {
            const container = document.getElementById("products-container");
            container.innerHTML = "";
            const emojis = {"beer":"🍻","soda":"🥤","energy":"⚡","water":"💧","wh":"🥃","vd":"🍸","liqueur":"🍹","cognac":"🐴","bb":"🍺","sn":"🍿"};
            
            catalogData[currentCategory].items.forEach(item => {
                const card = document.createElement("div");
                card.className = "product-card";
                card.innerHTML = `
                    <div class="product-img">${emojis[currentCategory] || "🎁"}</div>
                    <div class="product-name">${item.name}</div>
                    <div class="product-price">${item.price} ₸</div>
                    <button class="add-btn" onclick="addToCart('${item.name}', ${item.price})">В корзину</button>
                `;
                container.appendChild(card);
            });
        }

        function addToCart(name, price) {
            cart.push({name, price});
            let total = cart.reduce((sum, i) => sum + i.price, 0);
            document.getElementById("total-price").innerText = `Итого: ${total} ₸`;
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred("light");
        }

        function sendOrder() {
            if (cart.length === 0) {
                alert("Корзина пуста!");
                return;
            }
            tg.sendData(JSON.stringify(cart));
            tg.close();
        }

        renderCategories();
        renderProducts();
    </script>
</body>
</html>
