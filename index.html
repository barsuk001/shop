    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #131313; color: #ffffff; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; user-select: none; }
        .header { text-align: center; padding: 15px; font-size: 18px; font-weight: bold; border-bottom: 1px solid #2d2d2d; background-color: #1a1a1a; }
        .categories-menu { display: flex; overflow-x: auto; background-color: #1a1a1a; padding: 10px 5px; border-bottom: 1px solid #2d2d2d; gap: 8px; }
        .categories-menu::-webkit-scrollbar { display: none; }
        .category-btn { background-color: #262626; color: #b3b3b3; border: none; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; }
        .category-btn.active { background-color: #e67e22; color: #ffffff; }
        .products-container { flex: 1; overflow-y: auto; padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-content: start; padding-bottom: 80px; }
        .product-card { background-color: #1c1c1c; border-radius: 12px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid #2d2d2d; }
        .product-name { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #eceff1; }
        .product-price { font-size: 14px; font-weight: bold; color: #e67e22; margin-bottom: 10px; }
        .add-btn { background-color: #3498db; color: white; border: none; border-radius: 8px; padding: 9px; font-weight: bold; cursor: pointer; width: 100%; font-size: 13px; }
    </style>
</head>

                {"name": "Чипсы Lay's в ассортименте", "price": 1250}, {"name": "Курт домашний (порция)", "price": 700}
            ]}
        };

        let currentCategory = "soda";

        function renderCategories() {
            const menu = document.getElementById("categories-menu");
            for (let catId in catalogData) {
                const btn = document.createElement("button");
                btn.className = `category-btn ${catId === currentCategory ? 'active' : ''}`;
                btn.innerText = catalogData[catId].title;
                btn.onclick = () => {
                    document.querySelectorAll(".category-btn").forEach(b => b.classList.remove("active"));
                    btn.classList.add("active");
                    currentCategory = catId;
                    renderProducts();
                };
                menu.appendChild(btn);
            }
        }

        function renderProducts() {
            const container = document.getElementById("products-container");
            container.innerHTML = "";
            catalogData[currentCategory].items.forEach(item => {
                const card = document.createElement("div");
                card.className = "product-card";
                card.innerHTML = `
                    <div class="product-name">${item.name}</div>
                    <div class="product-price">${item.price} ₸</div>
                    <button class="add-btn" onclick="alert('Товар добавлен!')">В корзину</button>
                `;
                container.appendChild(card);
            });
        }

        renderCategories();
        renderProducts();
    </script>
</body>
</html>
