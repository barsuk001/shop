<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин Барсук</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #131313;
            --tg-theme-text-color: #ffffff;
            --tg-theme-button-color: #e67e22;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-hint-color: #b3b3b3;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            user-select: none;
        }

        .header {
            text-align: center;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid #2d2d2d;
            background-color: #1a1a1a;
            letter-spacing: 0.5px;
        }

        .container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            align-content: start;
            padding-bottom: 90px;
        }

        .product-card {
            background-color: #1c1c1c;
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid #2d2d2d;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
        }

        .product-img {
            width: 100%;
            height: 110px;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #262626;
            margin-bottom: 8px;
        }

        .product-name {
            font-size: 13px;
            font-weight: 600;
            margin: 0 0 6px 0;
            min-height: 34px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: #eceff1;
            line-height: 1.3;
        }

        .product-price {
            font-size: 14px;
            font-weight: bold;
            color: #e67e22;
            margin-bottom: 10px;
        }

        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 9px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.1s;
        }

        .btn:active {
            background-color: #2980b9;
        }

        .counter-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #262626;
            border-radius: 8px;
            padding: 2px;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-counter {
            background-color: #e67e22;
            color: white;
            border: none;
            border-radius: 6px;
            width: 32px;
            height: 32px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-counter:active {
            background-color: #d35400;
        }

        .counter-value {
            font-weight: bold;
            font-size: 14px;
            color: #ffffff;
            min-width: 24px;
            text-align: center;
        }

        .footer-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #1a1a1a;
            border-top: 1px solid #2d2d2d;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .total-price {
            font-size: 15px;
            font-weight: bold;
        }

        .checkout-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .checkout-btn:active {
            background-color: #27ae60;
        }

        /* 🛒 СТИЛИ МОДАЛЬНОГО ОКНА КОРЗИНЫ */
        .cart-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #131313;
            z-index: 2000;
            padding: 20px;
            overflow-y: auto;
            flex-direction: column;
        }

        .modal-header {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2d2d2d;
            padding-bottom: 10px;
        }

        .close-modal {
            background: none;
            border: none;
            color: #e74c3c;
            font-size: 24px;
            cursor: pointer;
        }

        .cart-items-list {
            flex: 1;
            margin-bottom: 20px;
        }

        .cart-item-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #232323;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #b3b3b3;
        }

        .form-control {
            width: 100%;
            background-color: #1a1a1a;
            border: 1px solid #3d3d3d;
            border-radius: 8px;
            padding: 12px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        .radio-group {
            display: flex;
            gap: 12px;
            margin-top: 5px;
        }

        .radio-label {
            flex: 1;
            background-color: #1a1a1a;
            border: 1px solid #3d3d3d;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        .radio-input {
            display: none;
        }

        .radio-input:checked + .radio-label {
            border-color: #e67e22;
            background-color: rgba(230, 126, 34, 0.1);
            color: #e67e22;
        }

        .submit-order-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="header">🦅 Магазин «Барсук»</div>

    <div class="container" id="catalog-container">
        <p style="text-align:center; color:gray; grid-column: span 2;">Загрузка товаров...</p>
    </div>

    <div class="footer-panel">
        <div class="total-price" id="total-price">Итого: 0 ₸</div>
        <button class="checkout-btn" onclick="openCartModal()">Оформить заказ</button>
    </div>

    <div class="cart-modal" id="cart-modal">
        <div class="modal-header">
            <span>Проверка заказа</span>
            <button class="close-modal" onclick="closeCartModal()">✕</button>
        </div>

        <div class="cart-items-list" id="cart-items-list"></div>

        <div class="form-group">
            <label for="user-phone">📞 Ваш номер телефона:</label>
            <input type="tel" id="user-phone" class="form-control" placeholder="+7 (707) 123-45-67">
        </div>

        <div class="form-group">
            <label>💰 Способ оплаты:</label>
            <div class="radio-group">
                <input type="radio" id="pay-kaspi" name="payment" value="Kaspi перевод" checked class="radio-input">
                <label for="pay-kaspi" class="radio-label">Kaspi перевод</label>

                <input type="radio" id="pay-cash" name="payment" value="Наличными" class="radio-input">
                <label for="pay-cash" class="radio-label">Наличными</label>
            </div>
        </div>

        <div style="font-size: 18px; font-weight: bold; margin: 20px 0; text-align: right;" id="modal-total">Итого: 0 ₸</div>

        <button class="submit-order-btn" onclick="sendFinalOrder()">Подтвердить заказ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let catalogData = {};
        let cartState = {}; 

        // 🖼 СЛОВАРЬ КАРТИНОК ДЛЯ КАЖДОГО КОНКРЕТНОГО ТОВАРА
        const productImages = {
            // Разливное пиво
            "Прага": "https://images.unsplash.com/photo-1608270586620-248524c67de9?w=400&q=80",
            "Эрзманн": "https://images.unsplash.com/photo-1566633806327-68e152aaf26d?w=400&q=80",
            "Чешское": "https://images.unsplash.com/photo-1532634922-8fe0b757fb13?w=400&q=80",
            "Жигули": "https://images.unsplash.com/photo-1571613316887-6f8d5cbf7ef7?w=400&q=80",
            "Шымкентское": "https://images.unsplash.com/photo-1584225065152-4a1454aa3d4e?w=400&q=80",
            "Кит": "https://images.unsplash.com/photo-1567696911980-2eed69a46042?w=400&q=80",
            "Немецкое": "https://images.unsplash.com/photo-1571613316887-6f8d5cbf7ef7?w=400&q=80",
            
            // Напитки и Соки
            "Coca-Cola": "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=400&q=80",
            "Fanta": "https://images.unsplash.com/photo-1624517452488-04869289c4ca?w=400&q=80",
            "Sprite": "https://images.unsplash.com/photo-1625772290748-160b84da4ad8?w=400&q=80",
            "Pepsi-Cola": "https://images.unsplash.com/photo-1531130176465-7207e3230a15?w=400&q=80",
            "Piko Ананас": "https://images.unsplash.com/photo-1613478223719-2ab802602423?w=400&q=80",
            "Piko Яблоко": "https://images.unsplash.com/photo-1619546813926-a78fa6372cd2?w=400&q=80",
            "Piko Вишня": "https://images.unsplash.com/photo-1534641290188-151c4a1a230e?w=400&q=80",
            "Piko Апельсин": "https://images.unsplash.com/photo-1611080626919-7cf5a9dbab5b?w=400&q=80",
            
            // Энергетики
            "Dizzy": "https://images.unsplash.com/photo-1622543953495-a178e2254b0d?w=400&q=80",
            "Red Bull": "https://images.unsplash.com/photo-1601053490124-747200b39673?w=400&q=80",
            "Gorilla": "https://images.unsplash.com/photo-1622543953495-a178e2254b0d?w=400&q=80",
            
            // Вода
            "Samal": "https://images.unsplash.com/photo-1548839140-29a749e1cf4d?w=400&q=80",
            "Bonaqua": "https://images.unsplash.com/photo-1608885898957-a599fb1ee65d?w=400&q=80",
            
            // Виски
            "Ballantine": "https://images.unsplash.com/photo-1527281473223-0cd44f932735?w=400&q=80",
            "Jack Daniel": "https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=400&q=80",
            "Monkey Shoulder": "https://images.unsplash.com/photo-1527281473223-0cd44f932735?w=400&q=80",
            "J&B": "https://images.unsplash.com/photo-1470337458703-46ad1756a187?w=400&q=80",
            "Clan MacGregor": "https://images.unsplash.com/photo-1527281473223-0cd44f932735?w=400&q=80",
            "William Lawson": "https://images.unsplash.com/photo-1527281473223-0cd44f932735?w=400&q=80",
            "Jameson": "https://images.unsplash.com/photo-1527281473223-0cd44f932735?w=400&q=80",
            "Johnnie Walker": "https://images.unsplash.com/photo-1527281473223-0cd44f932735?w=400&q=80",
            "Bell's": "https://images.unsplash.com/photo-1527281473223-0cd44f932735?w=400&q=80",
            
            // Водка
            "Beluga": "https://images.unsplash.com/photo-1550985543-f47f38aeee65?w=400&q=80",
            "Nomad": "https://images.unsplash.com/photo-1609154767012-331529e7d73b?w=400&q=80",
            "Хортиця": "https://images.unsplash.com/photo-1550985543-f47f38aeee65?w=400&q=80",
            "Nemiroff": "https://images.unsplash.com/photo-1550985543-f47f38aeee65?w=400&q=80",
            "Absolut": "https://images.unsplash.com/photo-1569098644584-210bcd375b59?w=400&q=80",
            "Finlandia": "https://images.unsplash.com/photo-1550985543-f47f38aeee65?w=400&q=80",
            "Синяя гора": "https://images.unsplash.com/photo-1550985543-f47f38aeee65?w=400&q=80",
            "Хаома": "https://images.unsplash.com/photo-1609154767012-331529e7d73b?w=400&q=80",
            
            // Закуски
            "Чечел": "https://images.unsplash.com/photo-1553163147-622ab574d88e?w=400&q=80",
            "Джинн": "https://images.unsplash.com/photo-1599490659213-e2b9527bb087?w=400&q=80",
            "Арахис": "https://images.unsplash.com/photo-1569562211093-4ed0d0758f12?w=400&q=80",
            "Lay's": "https://images.unsplash.com/photo-1566478989037-eec170784d0b?w=400&q=80",
            "Курт": "https://images.unsplash.com/photo-1600271886742-f049cd451bba?w=400&q=80"
        };

        // Подбор картинки по ключевому слову из названия товара
        function getProductImage(name) {
            for (const key in productImages) {
                if (name.toLowerCase().includes(key.toLowerCase())) {
                    return productImages[key];
                }
            }
            return "https://images.unsplash.com/photo-1542838132-92c53300491e?w=400&q=80"; // Общая заглушка магазина
        }

        // Загрузка каталога
        fetch('shop_catalog.json?v=' + Date.now())
            .then(response => response.json())
            .then(data => {
                catalogData = data;
                renderCatalog();
            })
            .catch(error => {
                console.error("Ошибка загрузки:", error);
                document.getElementById('catalog-container').innerHTML = '<p style="text-align:center; color:red; grid-column: span 2;">Ошибка загрузки товаров.</p>';
            });

        // Функция рендеринга каталога
        function renderCatalog() {
            const container = document.getElementById('catalog-container');
            container.innerHTML = ''; 

            for (const catKey in catalogData) {
                const category = catalogData[catKey];
                const activeItems = category.items.filter(item => item.status !== false);
                if (activeItems.length === 0) continue;

                // Заголовок категории на весь экран (2 колонки)
                const titleNode = document.createElement('div');
                titleNode.style.gridColumn = 'span 2';
                titleNode.style.fontSize = '16px';
                titleNode.style.fontWeight = 'bold';
                titleNode.style.color = '#e67e22';
                titleNode.style.marginTop = '15px';
                titleNode.style.borderBottom = '1px solid #2d2d2d';
                titleNode.style.paddingBottom = '5px';
                titleNode.innerText = category.title;
                container.appendChild(titleNode);

                activeItems.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'product-card';

                    const encodedName = btoa(encodeURIComponent(item.name));
                    const imgUrl = getProductImage(item.name);

                    card.innerHTML = `
                        <div class="product-img" style="background-image: url('${imgUrl}')"></div>
                        <div class="product-name">${item.name}</div>
                        <div>
                            <div class="product-price">${item.price} ₸</div>
                            <div id="box-${encodedName.replace(/=/g, '')}">
                                <button class="btn" onclick="changeQuantity('${encodedName}', 1, ${item.price})">В корзину</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }
        }

        function changeQuantity(encodedName, change, price) {
            const name = decodeURIComponent(atob(encodedName));
            if (!cartState[name]) {
                cartState[name] = { price: price, count: 0 };
            }

            cartState[name].count += change;
            const safeId = encodedName.replace(/=/g, '');

            if (cartState[name].count <= 0) {
                delete cartState[name];
                document.getElementById(`box-${safeId}`).innerHTML = `
                    <button class="btn" onclick="changeQuantity('${encodedName}', 1, ${price})">В корзину</button>
                `;
            } else {
                document.getElementById(`box-${safeId}`).innerHTML = `
                    <div class="counter-container">
                        <button class="btn-counter" onclick="changeQuantity('${encodedName}', -1, ${price})">−</button>
                        <span class="counter-value">${cartState[name].count}</span>
                        <button class="btn-counter" onclick="changeQuantity('${encodedName}', 1, ${price})">+</button>
                    </div>
                `;
            }

            updateTotal();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred("light");
        }

        function calculateTotal() {
            let total = 0;
            for (const name in cartState) {
                total += cartState[name].count * cartState[name].price;
            }
            return total;
        }

        function updateTotal() {
            let total = calculateTotal();
            document.getElementById("total-price").innerText = `Итого: ${total} ₸`;
        }

        function openCartModal() {
            const total = calculateTotal();
            if (total === 0) {
                alert("Ваша корзина пуста!");
                return;
            }

            const listContainer = document.getElementById("cart-items-list");
            listContainer.innerHTML = "";
            
            for (let name in cartState) {
                const count = cartState[name].count;
                const price = cartState[name].price;
                const row = document.createElement("div");
                row.className = "cart-item-row";
                row.innerHTML = `
                    <span>${name} <b>x${count}</b></span>
                    <span>${price * count} ₸</span>
                `;
                listContainer.appendChild(row);
            }

            document.getElementById("modal-total").innerText = `Итого: ${total} ₸`;
            document.getElementById("cart-modal").style.display = "flex";
        }

        function closeCartModal() {
            document.getElementById("cart-modal").style.display = "none";
        }

        function sendFinalOrder() {
            const phoneInput = document.getElementById("user-phone").value.trim();
            const paymentMethod = document.querySelector('input[name="payment"]:checked').value;

            if (!phoneInput || phoneInput.length < 7) {
                alert("Пожалуйста, введите корректный номер телефона!");
                return;
            }

            let flatCart = [];
            for (const name in cartState) {
                for (let i = 0; i < cartState[name].count; i++) {
                    flatCart.push({
                        name: name,
                        price: cartState[name].price
                    });
                }
            }

            const orderPayload = {
                items: flatCart,
                phone: phoneInput,
                payment: paymentMethod
            };

            tg.sendData(JSON.stringify(orderPayload));
            tg.close();
        }
    </script>
</body>
</html>
